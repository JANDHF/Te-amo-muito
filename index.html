<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
body{
    margin:0;
        height:100vh;
            display:flex;
                justify-content:center;
                    align-items:center;
                        background:linear-gradient(135deg,#ff4d6d,#ff8fab);
                            font-family:Arial,sans-serif;
                                overflow:hidden;
                                }

                                .container{
                                    text-align:center;
                                        color:white;
                                        }

                                        .heart{
                                            font-size:250px;
                                                animation:pulse 1.5s infinite;
                                                }

                                                h1{
                                                    font-size:3rem;
                                                        margin:0;
                                                            text-shadow:2px 2px 10px rgba(0,0,0,0.3);
                                                            }

                                                            p{
                                                                font-size:1.8rem;
                                                                    margin-top:20px;
                                                                    }

                                                                    @keyframes pulse{
                                                                        0%{transform:scale(1);}
                                                                            50%{transform:scale(1.15);}
                                                                                100%{transform:scale(1);}
                                                                                }
                                                                                </style>
                                                                                </head>

                                                                                <body>
                                                                                    <div class="container">
                                                                                            <div class="heart">❤️</div>
                                                                                                    <h1>TE AMO</h1>
                                                                                                            <p>Amor da minha vida</p>
                                                                                                                    <p><strong>Assinado:</strong> Gabriel, seu bbzudo ❤️</p>
                                                                                                                        </div>
                                                                                                                        </body>
                                                                                                                        </html>
